# 8GI Board Control Plane - Fly.io deployment
# Owns all Discord gateway connections, SQLite task queue, vessel coordination

app = "8gi-board-plane"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/data/board-plane.db"
  VESSEL_PORT = "3100"
  RATE_LIMIT_MS = "10000"
  STALE_TASK_MAX_AGE_MS = "120000"
  HEALTH_CHECK_INTERVAL_MS = "30000"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[mounts]
  source = "board_plane_data"
  destination = "/data"
